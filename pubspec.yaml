name: circle_map
description: "A free, no-subscription group location, speed & trip tracker with hazard reports and live helicopter overlay."
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.3.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter

  firebase_core: ^3.6.0
  firebase_auth: ^5.3.1
  cloud_firestore: ^5.4.4
  firebase_messaging: ^15.1.3
  firebase_storage: ^12.3.4
  google_sign_in: ^6.3.0
  sign_in_with_apple: ^6.1.4
  flutter_svg: ^2.0.10+1

  google_maps_flutter: ^2.9.0
  geolocator: ^13.0.1
  geocoding: ^3.0.0

  sensors_plus: ^6.0.1

  provider: ^6.1.2

  flutter_background_service: ^5.0.10
  flutter_local_notifications: ^17.2.3

  image_picker: ^1.1.2

  flutter_colorpicker: ^1.1.0
  battery_plus: ^6.2.3

  http: ^1.2.2

  uuid: ^4.5.1
  intl: ^0.19.0
  permission_handler: ^11.3.1
  fl_chart: ^0.69.0
  shared_preferences: ^2.3.2
  url_launcher: ^6.3.1

  flutter_web_plugins:
    sdk: flutter
  platform_maps_flutter: ^1.0.2
  flutter_map: ^8.3.1
  latlong2: ^0.10.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  flutter_launcher_icons: ^0.14.4

# For information on the generic Dart part of this file, see the
# following page: https://dart.dev/tools/pub/pubspec

# The following section is specific to Flutter packages.
flutter:

  # The following line ensures that the Material Icons font is
  # included with your application, so that you can use the icons in
  # the material Icons class.
  uses-material-design: true

  assets:
    - assets/icons/

  # An image asset can refer to one or more resolution-specific "variants", see
  # https://flutter.dev/to/resolution-aware-images

  # For details regarding adding assets from package dependencies, see
  # https://flutter.dev/to/asset-from-package

  # To add custom fonts to your application, add a fonts section here,
  # in this "flutter" section. Each entry in this list should have a
  # "family" key with the font family name, and a "fonts" key with a
  # list giving the asset and other descriptors for the font. For
  # example:
  # fonts:
  #   - family: Schyler
  #     fonts:
  #       - asset: fonts/Schyler-Regular.ttf
  #       - asset: fonts/Schyler-Italic.ttf
  #         style: italic
  #   - family: Trajan Pro
  #     fonts:
  #       - asset: fonts/TrajanPro.ttf
  #       - asset: fonts/TrajanPro_Bold.ttf
  #         weight: 700
  #
  # For details regarding fonts from package dependencies,
  # see https://flutter.dev/to/font-from-package

flutter_launcher_icons:
  android: true
  ios: true
  remove_alpha_ios: true
  image_path: assets/icons/app_icon_saturn.png
  adaptive_icon_background: "#000000"
  adaptive_icon_foreground: assets/icons/app_icon_saturn.png
  adaptive_icon_foreground_inset: 0
  web:
    generate: true
    image_path: assets/icons/app_icon_saturn.png
    background_color: "#000000"
    theme_color: "#000000"
  windows:
    generate: true
    image_path: assets/icons/app_icon_saturn.png
    icon_size: 256
  macos:
    generate: false
